<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Users</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #444;
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      background: #4CAF50;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }

    button:hover {
      background: #45a049;
    }

    #list {
      margin-top: 20px;
    }

    .user {
      background: #f1f1f1;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div class="container">

<h1>👥 Gestion des utilisateurs</h1>

<h2>Ajouter utilisateur</h2>
<form id="form">
  <input type="text" id="nom" placeholder="Nom" required>
  <input type="text" id="prenom" placeholder="Prénom" required>
  <input type="number" id="age" placeholder="Age">
  <button type="submit">➕ Ajouter</button>
</form>

<h2>Liste</h2>
<button onclick="loadUsers()">📥 Charger les utilisateurs</button>

<div id="list"></div>

</div>

<script>
async function loadUsers() {
  try {
    const res = await fetch('/api/users');
    const data = await res.json();

    const list = document.getElementById('list');
    list.innerHTML = '';

    data.forEach(u => {
      list.innerHTML += `
        <div class="user">
          <strong>${u.prenom} ${u.nom}</strong><br>
          Age: ${u.age} | ID: ${u.id}
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
  }
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const nom = document.getElementById('nom').value;
  const prenom = document.getElementById('prenom').value;
  const age = document.getElementById('age').value || 0;

  try {
    await fetch('/api/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nom, prenom, age })
    });

    alert('✅ Utilisateur ajouté');

    document.getElementById('form').reset();
    loadUsers();

  } catch (err) {
    console.error(err);
  }
});
</script>

</body>
</html>
